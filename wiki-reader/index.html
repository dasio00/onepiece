<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>One Piece Wiki Reader</title>
<style>
:root{--bg:#f7f6f1;--paper:#fff;--ink:#20242a;--muted:#66707a;--line:#ddd8cc;--red:#b4232a;--teal:#1a7b82}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}button,input{font:inherit}
header{position:sticky;top:0;z-index:2;display:grid;grid-template-columns:max-content minmax(0,1fr) max-content;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);background:rgba(255,253,248,.96)}
.brand{font-weight:800;white-space:nowrap}.brand b{display:inline-grid;place-items:center;width:34px;height:34px;margin-right:8px;border:2px solid var(--ink);border-radius:8px;color:var(--red);font-size:13px}
form{display:grid;grid-template-columns:minmax(0,1fr) max-content;gap:8px}input{height:42px;padding:0 12px;border:1px solid var(--line);border-radius:8px}button,.src{min-height:38px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);padding:0 12px;text-decoration:none}.go{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}.seg{display:inline-flex;gap:4px}.seg button.on{border-color:var(--teal);color:var(--teal);font-weight:700}
.status{display:grid;grid-template-columns:max-content 1fr;gap:12px;align-items:center;padding:8px 16px;border-bottom:1px solid var(--line);color:var(--muted);font-size:14px}.bar{height:6px;border-radius:999px;background:#e8e2d6;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,var(--red),#c79a33,var(--teal))}
main{display:grid;grid-template-columns:240px minmax(0,1fr);gap:18px;width:min(1280px,100%);margin:0 auto;padding:18px}.toc,.article{border:1px solid var(--line);border-radius:8px;background:var(--paper)}.toc{position:sticky;top:104px;align-self:start;max-height:calc(100vh - 122px);overflow:auto;padding:12px}.toc h2{margin:0 0 8px;color:var(--muted);font-size:12px;text-transform:uppercase}.toc a{display:block;padding:7px 8px;border-radius:6px;color:var(--ink);font-size:14px;text-decoration:none}.toc a[data-l="3"]{padding-left:18px;color:var(--muted)}
.head{display:grid;grid-template-columns:minmax(0,1fr) max-content;gap:10px;padding:22px 24px 16px;border-bottom:1px solid var(--line)}h1{margin:0;font-size:30px;line-height:1.15;overflow-wrap:anywhere}.content{min-height:55vh;padding:24px;line-height:1.75;overflow-wrap:anywhere}.content h2,.content h3,.content h4{clear:both;margin:30px 0 12px;scroll-margin-top:118px}.content h2{padding-bottom:8px;border-bottom:2px solid #eee6d8}.content p,.content ul,.content ol,.content table{margin-top:0;margin-bottom:15px}.content a{color:#8f171d;text-underline-offset:3px}.content img{max-width:100%;height:auto;border-radius:6px}.content table{display:block;width:100%;overflow:auto;border-collapse:collapse;font-size:14px}.content td,.content th{border:1px solid var(--line);padding:7px 9px;vertical-align:top}.content th{background:#f1ecdf}.portable-infobox{float:right;width:min(310px,42%);margin:0 0 18px 22px;padding:12px;border:1px solid var(--line);border-radius:8px;background:#fbf7ee;font-size:14px;line-height:1.45}.pi-title,.pi-header{font-weight:800;color:#8f171d}
@media(max-width:800px){header{grid-template-columns:1fr}.brand{white-space:normal}main{grid-template-columns:1fr;padding:12px}.toc{position:static;max-height:none}.head{grid-template-columns:1fr}.portable-infobox{float:none;width:100%;margin:0 0 16px}.status{grid-template-columns:1fr}}
</style>
<body>
<header>
<div class="brand"><b>OP</b>One Piece Wiki Reader</div>
<form id="form"><input id="query" placeholder="Ope Ope no Mi or wiki URL"><button class="go">Load</button></form>
<div class="seg"><button id="ko" class="on" type="button">Korean</button><button id="en" type="button">Original</button><a id="src" class="src" href="#" target="_blank" rel="noreferrer">Source</a></div>
</header>
<div class="status"><span id="status">Ready</span><div class="bar"><div id="fill" class="fill"></div></div></div>
<main><aside class="toc"><h2>Contents</h2><nav id="toc"></nav></aside><article class="article"><div class="head"><h1 id="title">Load an article</h1><button id="translate" type="button" disabled>Translate</button></div><section id="content" class="content"><p>Enter a One Piece Wiki article title or URL.</p></section></article></main>
<script>
const API="https://onepiece.fandom.com/api.php",ORIGIN="https://onepiece.fandom.com",TR="https://translate.googleapis.com/translate_a/single";
const $=s=>document.querySelector(s),ui={q:$("#query"),form:$("#form"),title:$("#title"),content:$("#content"),toc:$("#toc"),status:$("#status"),fill:$("#fill"),tr:$("#translate"),ko:$("#ko"),en:$("#en"),src:$("#src")};
let nodes=[],mode="ko",run=0,cache=new Map(),tcache=new Map();
ui.form.onsubmit=e=>{e.preventDefault();if(ui.q.value.trim())load(ui.q.value.trim())};
ui.tr.onclick=()=>translateAll();
ui.ko.onclick=()=>setMode("ko");ui.en.onclick=()=>setMode("en");
ui.content.onclick=e=>{const a=e.target.closest("a[data-page]");if(!a)return;e.preventDefault();ui.q.value=a.dataset.page;load(a.dataset.page)};
addEventListener("DOMContentLoaded",()=>{const q=new URLSearchParams(location.search).get("q");if(q){ui.q.value=q;load(q)}});
async function load(input){const my=++run;msg("Loading article",10);ui.tr.disabled=true;ui.content.innerHTML="";ui.toc.innerHTML="";try{const page=await article(input);render(page);history.replaceState({},"",`?q=${encodeURIComponent(page.title)}${location.hash||""}`);msg("Article ready",0);scrollHash();if(my===run)await translateAll()}catch(e){ui.title.textContent="Error";ui.content.innerHTML=`<p>${esc(e.message)}</p>`;msg("Error",0)}}
async function article(input){const guess=titleOf(input),key=guess.toLowerCase();if(cache.has(key))return cache.get(key);let p=await parse(guess);if(p.error){const found=await search(guess);if(!found)throw Error(`Could not find "${guess}".`);p=await parse(found)}if(p.error)throw Error(`Could not load "${guess}".`);const out={title:p.title,display:p.display,source:`${ORIGIN}/wiki/${encodeURIComponent(p.title.replaceAll(" ","_"))}`,sections:p.sections,html:clean(p.html)};cache.set(key,out);return out}
function titleOf(v){try{const u=new URL(v),m="/wiki/",i=u.pathname.indexOf(m);if(i>=0)return decodeURIComponent(u.pathname.slice(i+m.length)).replaceAll("_"," ")}catch{}return v.replace(/^https?:\/\/onepiece\.fandom\.com\/wiki\//i,"").replace(/^\/?wiki\//i,"").replaceAll("_"," ").trim()}
async function parse(page){const qs=new URLSearchParams({action:"parse",page,prop:"text|sections|displaytitle",redirects:"1",format:"json",formatversion:"2",origin:"*"}),d=await json(`${API}?${qs}`);if(d.error)return{error:d.error};return{title:d.parse.title,display:text(d.parse.displaytitle||d.parse.title),html:typeof d.parse.text==="string"?d.parse.text:d.parse.text?.["*"]||"",sections:(d.parse.sections||[]).filter(s=>s.anchor&&s.line&&!/^(references|site navigation|external links|notes)$/i.test(text(s.line))).map(s=>({anchor:s.anchor,level:+s.level||2,title:text(s.line)}))}}
async function search(q){const qs=new URLSearchParams({action:"query",list:"search",srsearch:q,srlimit:"1",format:"json",formatversion:"2",origin:"*"}),d=await json(`${API}?${qs}`);return d.query?.search?.[0]?.title||""}
async function json(url){const r=await fetch(url,{cache:"force-cache"});if(!r.ok)throw Error(`HTTP ${r.status}`);return r.json()}
function clean(raw){const doc=new DOMParser().parseFromString(raw,"text/html"),root=doc.querySelector(".mw-parser-output")||doc.body;root.querySelectorAll("script,style,noscript,.mw-editsection,.reference,.references,.reflist,.toc,.catlinks,.printfooter,.article-tabs,.onlymobile,.cs.vde,.wds-tabs__wrapper,.wds-tab__content:not(.wds-is-current),.navbox,.metadata,.noprint,.mw-empty-elt").forEach(x=>x.remove());root.querySelectorAll("table").forEach(t=>{const s=t.textContent.trim();if(!s||/Featured Article/i.test(s))t.remove()});root.querySelectorAll("h2,h3").forEach(h=>{if(/^(references|site navigation|external links|notes)$/i.test(h.textContent.trim()))dropSection(h)});root.querySelectorAll("img").forEach(img=>{let src=img.getAttribute("src")||img.getAttribute("data-src")||"";if(src.startsWith("//"))src="https:"+src;if(!/^https?:/.test(src)){img.remove();return}img.src=src;img.loading="lazy";img.removeAttribute("srcset")});root.querySelectorAll("a").forEach(a=>{const href=a.getAttribute("href")||"";if(href.startsWith("/wiki/")){a.href="#";a.dataset.page=decodeURIComponent(href.slice(6).split("#")[0]).replaceAll("_"," ")}else if(href.startsWith("//")){a.href="https:"+href;a.target="_blank";a.rel="noreferrer"}else if(href.startsWith("http")){a.target="_blank";a.rel="noreferrer"}else if(!href.startsWith("#"))a.removeAttribute("href")});root.querySelectorAll("span.mw-headline").forEach(s=>{if(s.id)s.parentElement?.setAttribute("id",s.id)});sanitize(root);return root.innerHTML}
function dropSection(h){const l=+h.tagName.slice(1);let n=h.nextElementSibling;while(n){const nl=/^H[2-5]$/.test(n.tagName)?+n.tagName.slice(1):0;if(nl&&nl<=l)break;const x=n.nextElementSibling;n.remove();n=x}h.remove()}
function sanitize(root){const ok=new Set("a abbr aside b blockquote br caption cite code dd del details div dl dt em figcaption figure h2 h3 h4 h5 hr i img li ol p small span strong sub summary sup table tbody td tfoot th thead tr u ul".split(" "));root.querySelectorAll("*").forEach(el=>{const tag=el.tagName.toLowerCase();if(!ok.has(tag)){el.replaceWith(...el.childNodes);return}[...el.attributes].forEach(a=>{const n=a.name.toLowerCase();if(n==="style"||n.startsWith("on"))el.removeAttribute(a.name)});if(tag==="img"&&!/^https?:/.test(el.getAttribute("src")||""))el.remove()})}
function render(p){ui.title.textContent=p.display||p.title;ui.src.href=p.source;ui.content.innerHTML=p.html;headings();toc(p.sections);nodes=collect(ui.content);ui.tr.disabled=!nodes.length;setMode(mode)}
function headings(){ui.content.querySelectorAll("h2,h3,h4,h5").forEach(h=>{if(!h.closest(".portable-infobox")&&!h.id)h.id=slug(h.textContent)})}
function toc(sections){const by=new Map([...ui.content.querySelectorAll("h2,h3,h4,h5")].filter(h=>h.id&&!h.closest(".portable-infobox")).map(h=>[h.id,h]));let items=sections.filter(s=>s.level<=3&&by.has(s.anchor));if(!items.length)items=[...by.values()].slice(0,80).map(h=>({anchor:h.id,title:h.textContent.trim(),level:+h.tagName.slice(1)}));ui.toc.innerHTML=items.map(i=>`<a href="#${encodeURIComponent(i.anchor)}" data-l="${i.level}">${esc(i.title)}</a>`).join("")||"No sections"}
function collect(root){const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode(n){const p=n.parentElement,v=n.nodeValue||"";return p&&should(v)&&!p.closest("script,style,code,pre,kbd,samp,.reference")?NodeFilter.FILTER_ACCEPT:NodeFilter.FILTER_REJECT}}),out=[];let n=w.nextNode();while(n){out.push({node:n,en:n.nodeValue,ko:""});n=w.nextNode()}return out}
async function translateAll(){if(!nodes.length)return;const my=++run;ui.tr.disabled=true;let done=nodes.filter(n=>n.ko).length,fail=0;setMode("ko");progress(done,nodes.length,fail);for(const batch of chunks(nodes.filter(n=>!n.ko),30)){if(my!==run)return;await Promise.all(batch.map(async n=>{try{n.ko=await trans(n.en);if(mode==="ko")n.node.nodeValue=n.ko}catch{fail++;n.ko=n.en}finally{done++;progress(done,nodes.length,fail)}}))}msg(fail?`Done, kept ${fail} originals`:"Translation complete",100);ui.tr.disabled=false;scrollHash()}
async function trans(v){if(!should(v))return v;const lead=v.match(/^\s*/)?.[0]||"",trail=v.match(/\s*$/)?.[0]||"",core=v.trim();if(tcache.has(core))return lead+tcache.get(core)+trail;const qs=new URLSearchParams({client:"gtx",sl:"en",tl:"ko",dt:"t",q:core}),d=await json(`${TR}?${qs}`),r=(d?.[0]||[]).map(x=>x?.[0]||"").join("");tcache.set(core,r);return lead+r+trail}
function setMode(m){mode=m;ui.ko.classList.toggle("on",m==="ko");ui.en.classList.toggle("on",m==="en");nodes.forEach(n=>n.node.nodeValue=m==="ko"&&n.ko?n.ko:n.en)}
function progress(d,t,f){msg(`Translating ${d}/${t}${f?`, kept ${f}`:""}`,t?Math.round(d/t*100):0)}
function msg(s,p){ui.status.textContent=s;ui.fill.style.width=Math.max(0,Math.min(100,p))+"%"}
function should(v){const t=v.trim();return t.length>1&&/[A-Za-z]/.test(t)&&!/^[\d\s()[\]{}.,:;'"!?+\-/\\|%]+$/.test(t)}
function chunks(a,n){const out=[];for(let i=0;i<a.length;i+=n)out.push(a.slice(i,i+n));return out}
function scrollHash(){if(!location.hash)return;const el=document.getElementById(decodeURIComponent(location.hash.slice(1)));if(el)requestAnimationFrame(()=>el.scrollIntoView({block:"start"}))}
function text(h){return new DOMParser().parseFromString(`<div>${h}</div>`,"text/html").body.textContent.trim()}
function slug(v){return v.trim().replace(/\s+/g,"_").replace(/[^\p{L}\p{N}_-]/gu,"").slice(0,80)}
function esc(v){return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
</script>
</body>
</html>
